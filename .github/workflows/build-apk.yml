name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build debug APK
        shell: bash
        run: |
          set -o pipefail
          gradle assembleDebug --stacktrace --warning-mode all 2>&1 | tee build-log.txt

      - name: Generate release signing key
        run: |
          keytool -genkeypair \
            -v \
            -keystore release.keystore \
            -storepass android \
            -keypass android \
            -alias evtop \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=EVTOP BMS, OU=EVTOP, O=EVTOP, L=Lagos, ST=Lagos, C=NG"

      - name: Build signed release APK
        shell: bash
        env:
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: android
          ANDROID_KEY_ALIAS: evtop
          ANDROID_KEY_PASSWORD: android
        run: |
          set -o pipefail
          gradle assembleRelease --stacktrace --warning-mode all 2>&1 | tee -a build-log.txt

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: EVTOP-BMS-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: EVTOP-BMS-release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: EVTOP-BMS-build-log
          path: build-log.txt
